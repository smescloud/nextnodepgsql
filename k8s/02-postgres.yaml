apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-demo-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-demo-db
  template:
    metadata:
      labels:
        app: ai-demo-db
    spec:
      containers:
        - name: postgres
          image: postgres:12
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: ai-demo-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ai-demo-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-demo-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: ai-demo-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ai-demo-db
spec:
  selector:
    app: ai-demo-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP