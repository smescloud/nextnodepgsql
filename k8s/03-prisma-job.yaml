apiVersion: batch/v1
kind: Job
metadata:
  name: ai-demo-prisma-db-push
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: prisma-db-push
          image: REGISTRY/ai-demo-backend:TAG
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              until npx prisma db push; do
                echo "waiting for db..."
                sleep 5
              done
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-demo-secret
                  key: DATABASE_URL