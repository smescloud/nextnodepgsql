apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ai-demo
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`nextnodepostgres-eu001.smescloud.com`)
      kind: Rule
      services:
        - name: ai-demo-frontend
          port: 3000
  tls:
    secretName: ai-demo-tls
