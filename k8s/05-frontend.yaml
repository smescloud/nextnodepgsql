apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-demo-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-demo-frontend
  template:
    metadata:
      labels:
        app: ai-demo-frontend
    spec:
      containers:
        - name: frontend
          image: smescloud/nextnodepgsql-frontend:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: BACKEND_URL
              value: "http://ai-demo-backend:4000"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-demo-frontend
spec:
  selector:
    app: ai-demo-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
