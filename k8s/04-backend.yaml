apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-demo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-demo-backend
  template:
    metadata:
      labels:
        app: ai-demo-backend
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z ai-demo-db 5432; do
                echo "waiting for postgres..."
                sleep 2
              done
      containers:
        - name: backend
          image: ghcr.io/smescloud/nextnodepgsql-backend:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-demo-secret
                  key: DATABASE_URL
            - name: PORT
              value: "4000"
          readinessProbe:
            httpGet:
              path: /test
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /test
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-demo-backend
spec:
  selector:
    app: ai-demo-backend
  ports:
    - name: http
      port: 4000
      targetPort: 4000
  type: ClusterIP