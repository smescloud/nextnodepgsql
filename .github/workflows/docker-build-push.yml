name: Build and Push Docker Images

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_USERNAME: smescloud

jobs:
  build-and-push:
    name: Build and push ${{ matrix.component }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: ./backend
            image: smescloud/nextnodepgsql-backend

          - component: frontend
            context: ./frontend
            image: smescloud/nextnodepgsql-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=sha,format=long,prefix=
          labels: |
            org.opencontainers.image.title=nextnodepgsql-${{ matrix.component }}
            org.opencontainers.image.description=NextNodePgSQL ${{ matrix.component }} image
            org.opencontainers.image.vendor=SMEsCloud

      - name: Build and push ${{ matrix.component }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          provenance: true
          sbom: true
